# HuggingFace Dataset Metadata Extractor - Configuration

# LLM 配置
llm:
  model: "glm-5-turbo"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  api_key: "0ae785e691cc4159a99a7f60f869a9bb.0eis0htIzPx6i8y3"  # 改为环境变量: ${ZHIPU_API_KEY}
  temperature: 0.1
  max_tokens: 2000

# 请求配置
requests:
  timeout: 30
  retry_max: 3
  retry_interval: 2  # 秒
  sleep_between_items: 1.5  # 每条数据间隔

# 数据预览配置
data_preview:
  max_columns: 15
  max_rows: 5
  max_cell_length: 200

# README 配置
readme:
  max_length: 3000

# 输出配置
output:
  desktop: true  # 输出到桌面
  format: "xlsx"  # 可选 xlsx, json

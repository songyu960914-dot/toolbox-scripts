# HuggingFace Dataset Metadata Extractor - Configuration

# LLM й…ҚзҪ®
llm:
  model: "glm-5-turbo"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  api_key: "${ZHIPU_API_KEY}"  # ж”№дёәзҺҜеўғеҸҳйҮҸ: ${ZHIPU_API_KEY}
  temperature: 0.1
  max_tokens: 2000

# иҜ·жұӮй…ҚзҪ®
requests:
  timeout: 30
  retry_max: 3
  retry_interval: 2  # з§?  sleep_between_items: 1.5  # жҜҸжқЎж•°жҚ®й—ҙйҡ”

# ж•°жҚ®йў„и§Ҳй…ҚзҪ®
data_preview:
  max_columns: 15
  max_rows: 5
  max_cell_length: 200

# README й…ҚзҪ®
readme:
  max_length: 3000

# иҫ“еҮәй…ҚзҪ®
output:
  desktop: true  # иҫ“еҮәеҲ°жЎҢйқ?  format: "xlsx"  # еҸҜйҖ?xlsx, json

